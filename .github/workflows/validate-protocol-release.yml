name: Validate protocol 0.2 release branch

on:
  push:
    branches:
      - agent/protocol-0.2.0-20260721
    paths:
      - .github/workflows/validate-protocol-release.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/protocol-0.2.0-20260721
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and validate release tree
        run: |
          python -m pip install --upgrade pyyaml
          npm run build:catalog
          npm test
          npm pack --dry-run
      - name: Finalize branch
        run: |
          rm -f .github/workflows/validate-protocol-release.yml
          git config user.name "Architectonic Release Agent"
          git config user.email "release-agent@users.noreply.github.com"
          git add -A
          git commit -m "Release Architectonic protocol 0.2.0"
          git push origin HEAD:agent/protocol-0.2.0-20260721
