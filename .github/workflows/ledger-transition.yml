name: Apply canonical ledger transitions

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ledger-transition.yml'
      - 'scripts/apply_ledger_transitions.py'
      - 'operations/ledger-transitions/**'
      - 'operations/ledger.json'
  pull_request:
    paths:
      - '.github/workflows/ledger-transition.yml'
      - 'scripts/apply_ledger_transitions.py'
      - 'operations/ledger-transitions/**'
      - 'operations/ledger.json'

permissions:
  contents: write

concurrency:
  group: canonical-ledger-${{ github.ref }}
  cancel-in-progress: false

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate transition processor syntax
        run: python -m py_compile scripts/apply_ledger_transitions.py

      - name: Apply reviewed transitions
        if: github.event_name != 'pull_request'
        run: python scripts/apply_ledger_transitions.py --write

      - name: Commit canonical ledger
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "architectonic-bot"
          git config user.email "architectonic-bot@users.noreply.github.com"
          if git diff --quiet -- operations/ledger.json; then
            echo "Canonical ledger already current."
            exit 0
          fi
          git add operations/ledger.json
          git commit -m "operations: apply canonical ledger transition"
          git pull --rebase
          git push

      - name: Validate committed ledger parity
        if: github.event_name == 'pull_request'
        run: python scripts/apply_ledger_transitions.py
