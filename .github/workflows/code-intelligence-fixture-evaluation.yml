name: Evaluate code-intelligence skill fixtures

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/code-intelligence-fixture-evaluation.yml'
      - 'scripts/evaluate_code_intelligence_skills.py'
      - 'tests/fixtures/code-intelligence/**'
      - 'reports/evaluation/2026-07-22-code-intelligence-fixture-evaluation.*'
      - 'skills/codebase-structural-map.md'
      - 'skills/change-impact-review.md'
  pull_request:
    paths:
      - '.github/workflows/code-intelligence-fixture-evaluation.yml'
      - 'scripts/evaluate_code_intelligence_skills.py'
      - 'tests/fixtures/code-intelligence/**'
      - 'reports/evaluation/2026-07-22-code-intelligence-fixture-evaluation.*'
      - 'skills/codebase-structural-map.md'
      - 'skills/change-impact-review.md'

permissions:
  contents: read

concurrency:
  group: code-intelligence-fixture-evaluation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate evaluator syntax
        run: python -m py_compile scripts/evaluate_code_intelligence_skills.py

      - name: Validate committed report parity
        run: python scripts/evaluate_code_intelligence_skills.py
