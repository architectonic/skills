name: Validate catalog metadata

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/catalog-validation.yml'
      - 'scripts/build_distribution_catalog.py'
      - 'scripts/apply_catalog_decisions.py'
      - 'operations/classification-overrides.json'
      - 'operations/catalog-decisions.json'
      - 'operations/source-watchlist.json'
      - 'dist/skills/**'
      - 'skills/**'
      - 'sources/**'
      - 'package.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install catalog dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Validate package and Python syntax
        run: |
          npm test
          python -m py_compile \
            scripts/build_distribution_catalog.py \
            scripts/apply_catalog_decisions.py \
            scripts/discover_skill_sources.py \
            scripts/review_discovery_candidates.py

      - name: Build lifecycle-aware catalog in validation mode
        run: |
          npm run build:catalog
          python scripts/apply_catalog_decisions.py

      - name: Validate classifications, lifecycle decisions, and skill contracts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          catalog = json.loads(Path('dist/catalog.json').read_text(encoding='utf-8'))
          manifest = json.loads(Path('dist/install-manifest.json').read_text(encoding='utf-8'))
          summary = catalog.get('summary', {})

          if catalog.get('schema_version') != '0.2':
              raise SystemExit('catalog schema_version must be 0.2')
          if manifest.get('schema_version') != '0.2':
              raise SystemExit('install manifest schema_version must be 0.2')
          if summary.get('classification_overrides_applied', 0) < 60:
              raise SystemExit('expected at least 60 classification overrides')
          if summary.get('catalog_decisions_applied', 0) < 11:
              raise SystemExit('expected at least eleven deep catalog decisions')
          if summary.get('domain_counts', {}).get('uncategorized', 10**9) > 500:
              raise SystemExit('uncategorized count remains above first-batch acceptance threshold')
          if summary.get('risk_counts', {}).get('unspecified', 10**9) > 650:
              raise SystemExit('unspecified-risk count remains above first-batch acceptance threshold')

          entries = {entry.get('slug'): entry for entry in catalog.get('skills', [])}
          expected_classifications = {
              'Building Ransomware Playbook with CISA Framework': ('security-defensive', 'high', True),
              'Code Documentation Generator': ('software-engineering', 'low', False),
              'hyperframes': ('media', 'high', True),
              'hyperframes-cli': ('runtime-tools', 'high', True),
              'ai-seo': ('business', 'medium', True),
          }
          for slug, (domain, risk, review) in expected_classifications.items():
              entry = entries.get(slug)
              if not entry:
                  raise SystemExit(f'missing expected catalog entry: {slug}')
              actual = (entry.get('domain'), entry.get('risk_level'), entry.get('requires_review'))
              if actual != (domain, risk, review):
                  raise SystemExit(f'{slug} classification mismatch: {actual!r}')
              if not entry.get('classification_override'):
                  raise SystemExit(f'{slug} should disclose classification_override=true')

          expected_decisions = {
              'frontend-design': {
                  'lifecycle_status': 'superseded',
                  'install_recommendation': 'do-not-install',
                  'risk_level': 'medium',
                  'requires_review': True,
                  'source_status': 'package_reviewed_blocked',
                  'review_status': 'blocked_for_forced_branding_and_scope',
                  'superseded_by': 'skills/interface-design.md',
              },
              'frontend-ui-engineering': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'medium',
                  'requires_review': False,
              },
              'canvas-design': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'low',
                  'requires_review': False,
              },
              'hyperframes': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'high',
                  'requires_review': True,
                  'review_status': 'explicit_hyperframes_project_selection_required',
                  'superseded_by': 'skills/programmatic-video-production.md',
              },
              'hyperframes-cli': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'high',
                  'requires_review': True,
                  'review_status': 'command_cloud_publication_and_feedback_approval_required',
              },
              'hyperframes-core': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'medium',
                  'requires_review': False,
              },
              'hyperframes-animation': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'medium',
                  'requires_review': False,
              },
              'hyperframes-creative': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'medium',
                  'requires_review': False,
              },
              'hyperframes-registry': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'risk_level': 'high',
                  'requires_review': True,
              },
              'hyperframes-media': {
                  'lifecycle_status': 'superseded',
                  'install_recommendation': 'do-not-install',
                  'risk_level': 'high',
                  'requires_review': True,
                  'review_status': 'stale_media_workflow_replaced_by_media_use',
                  'superseded_by': 'media-use',
              },
              'media-use': {
                  'lifecycle_status': 'reviewed',
                  'install_recommendation': 'conditional',
                  'domain': 'media',
                  'risk_level': 'high',
                  'requires_review': True,
                  'review_status': 'credentials_network_filesystem_asset_rights_and_installer_review_required',
              },
          }
          for slug, expected in expected_decisions.items():
              entry = entries.get(slug)
              if not entry:
                  raise SystemExit(f'missing reviewed catalog entry: {slug}')
              if not entry.get('catalog_decision'):
                  raise SystemExit(f'{slug} should disclose catalog_decision=true')
              for key, value in expected.items():
                  if entry.get(key) != value:
                      raise SystemExit(
                          f'{slug} decision mismatch for {key}: '
                          f'expected {value!r}, got {entry.get(key)!r}'
                      )

          if 'operations/catalog-decisions.json' not in manifest.get('discovery_files', []):
              raise SystemExit('install manifest must expose catalog decisions')
          for field in [
              'lifecycle_status',
              'install_recommendation',
              'superseded_by',
              'decision_evidence',
          ]:
              if field not in manifest.get('selection_fields', []):
                  raise SystemExit(f'install manifest missing selection field {field}')

          required_sections = [
              '## Trigger',
              '## Inputs',
              '## Procedure',
              '## Verification',
              '## Failure Modes',
          ]
          reviewed_skills = {
              Path('skills/interface-design.md'): {
                  'source_status': 'distilled-reviewed',
                  'review_status': 'source_reviewed_utility_evaluation_pending',
                  'revision_contains': 'hallmark@aeb42fb354ff4efa36ab475773a082315a3af2ce',
              },
              Path('skills/interface-quality-audit.md'): {
                  'source_status': 'distilled-reviewed',
                  'review_status': 'source_reviewed_utility_evaluation_pending',
                  'revision_contains': 'taste-skill@98565e65bc3274ddf6eb0838734341714057178b',
              },
              Path('skills/interface-transition-review.md'): {
                  'source_status': 'distilled-reviewed',
                  'review_status': 'source_reviewed_utility_evaluation_pending',
                  'revision_contains': 'transitions.dev@047d036a79cc2ddecd868e7f1e3aa04b495644b2',
              },
              Path('skills/programmatic-video-production.md'): {
                  'source_status': 'distilled-reviewed',
                  'review_status': 'source_reviewed_utility_evaluation_pending',
                  'revision_contains': 'hyperframes@84e4eafacdaf96e8d137ba745af750448c5de0de',
              },
          }
          for path, expected in reviewed_skills.items():
              raw = path.read_text(encoding='utf-8')
              if not raw.startswith('---\n'):
                  raise SystemExit(f'{path} missing frontmatter')
              _, frontmatter_raw, body = raw.split('---', 2)
              frontmatter = yaml.safe_load(frontmatter_raw)
              for key in ['source_status', 'review_status']:
                  if frontmatter.get(key) != expected[key]:
                      raise SystemExit(
                          f'{path} expected {key}={expected[key]!r}, '
                          f'got {frontmatter.get(key)!r}'
                      )
              revision = str(frontmatter.get('source_revision') or '')
              if expected['revision_contains'] not in revision:
                  raise SystemExit(f'{path} missing pinned source revision')
              if 'unpinned-review-required' in revision:
                  raise SystemExit(f'{path} must not retain an unpinned revision')
              for section in required_sections:
                  if section not in body:
                      raise SystemExit(f'{path} missing required section {section}')

          video = Path('skills/programmatic-video-production.md')
          raw = video.read_text(encoding='utf-8')
          _, frontmatter_raw, body = raw.split('---', 2)
          frontmatter = yaml.safe_load(frontmatter_raw)
          if frontmatter.get('risk_level') != 'high' or frontmatter.get('requires_review') is not True:
              raise SystemExit('programmatic-video-production must remain high risk and review gated')
          if frontmatter.get('source_content_copied') is not False:
              raise SystemExit('programmatic-video-production must disclose source_content_copied=false')
          for required in [
              'remotion-skills@0dd76fafa3fd337b7bc6b5cd95b7db0179828a3d',
              'remotion-license@b8fdb73ae8600d011afb246a02b690bf6935f527',
              '## Output Contract',
              'Require separate explicit approval before any of:',
          ]:
              if required not in raw:
                  raise SystemExit(f'programmatic video skill missing evidence: {required}')

          candidate = Path('skills/recent-source-research.md')
          raw = candidate.read_text(encoding='utf-8')
          _, frontmatter_raw, body = raw.split('---', 2)
          frontmatter = yaml.safe_load(frontmatter_raw)
          if frontmatter.get('source_status') != 'distilled_candidate':
              raise SystemExit('recent-source-research must remain a distilled candidate')
          if frontmatter.get('source_revision') != 'unpinned-review-required':
              raise SystemExit('recent-source-research must disclose unpinned upstream revision')
          for section in required_sections:
              if section not in body:
                  raise SystemExit(f'{candidate} missing required section {section}')

          design_review = Path(
              'sources/reviewed/2026-07-22-design-quality-cluster.md'
          ).read_text(encoding='utf-8')
          for required in [
              'aeb42fb354ff4efa36ab475773a082315a3af2ce',
              '98565e65bc3274ddf6eb0838734341714057178b',
              '047d036a79cc2ddecd868e7f1e3aa04b495644b2',
              'No root `LICENSE` file was found',
              'do not copy or redistribute snippets',
          ]:
              if required not in design_review:
                  raise SystemExit(f'design source review missing evidence: {required}')

          video_review = Path(
              'sources/reviewed/2026-07-22-programmatic-video-cluster.md'
          ).read_text(encoding='utf-8')
          for required in [
              '84e4eafacdaf96e8d137ba745af750448c5de0de',
              '0dd76fafa3fd337b7bc6b5cd95b7db0179828a3d',
              'b8fdb73ae8600d011afb246a02b690bf6935f527',
              'License: Apache-2.0',
              'up to three employees',
              'do not copy or redistribute skill bodies',
              'Do not execute remote shell installers',
          ]:
              if required not in video_review:
                  raise SystemExit(f'programmatic video source review missing evidence: {required}')
          PY
