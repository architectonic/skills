name: Validate catalog metadata

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/catalog-validation.yml'
      - 'scripts/build_distribution_catalog.py'
      - 'scripts/apply_catalog_decisions.py'
      - 'scripts/validate_catalog.py'
      - 'operations/classification-overrides.json'
      - 'operations/catalog-decisions.json'
      - 'operations/catalog-decisions/**'
      - 'operations/source-watchlist.json'
      - 'dist/skills/**'
      - 'skills/**'
      - 'sources/**'
      - 'package.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install catalog dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Validate package and Python syntax
        run: |
          npm test
          python -m py_compile \
            scripts/build_distribution_catalog.py \
            scripts/apply_catalog_decisions.py \
            scripts/validate_catalog.py \
            scripts/discover_skill_sources.py \
            scripts/review_discovery_candidates.py

      - name: Build lifecycle-aware catalog in validation mode
        run: |
          npm run build:catalog
          python scripts/apply_catalog_decisions.py

      - name: Validate classifications, lifecycle decisions, and skill contracts
        run: python scripts/validate_catalog.py
